name: 'Run Command on Azure Container'
description: 'Runs commands on an Azure Container App revision via az containerapp exec'

inputs:
  app_name:
    description: 'Azure Container App name'
    required: true
  resource_group:
    description: 'Azure resource group'
    required: true
  revision:
    description: 'Target revision name (auto-detected if not provided)'
    required: false
    default: ''
  commands:
    description: 'Commands to run (newline separated)'
    required: true
  description:
    description: 'Description for logging'
    required: false
    default: 'commands'
  fail_on_error:
    description: 'Whether to fail on command error'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Run commands
      shell: bash
      run: |
        echo "⚙️  Running ${{ inputs.description }}..."

        APP="${{ inputs.app_name }}"
        RG="${{ inputs.resource_group }}"
        REVISION="${{ inputs.revision }}"
        COMMANDS="${{ inputs.commands }}"
        FAIL_ON_ERROR="${{ inputs.fail_on_error }}"

        if [ -z "$COMMANDS" ]; then
          echo "💡 No ${{ inputs.description }} to run"
          exit 0
        fi

        # Get active revision if not specified
        if [ -z "$REVISION" ]; then
          echo "📋 Getting active revision..."
          REVISION=$(az containerapp show \
            --name "$APP" \
            --resource-group "$RG" \
            --query "properties.latestRevisionName" -o tsv)
          echo "📝 Using revision: $REVISION"
        fi

        while IFS= read -r command; do
          if [ -n "$command" ]; then
            echo "Executing: $command"
            
            if [ "$FAIL_ON_ERROR" = 'true' ]; then
              script -e -c "az containerapp exec \
                --name \"$APP\" \
                --resource-group \"$RG\" \
                --revision \"$REVISION\" \
                --command \"$command\"" /tmp/typescript
            else
              script -e -c "az containerapp exec \
                --name \"$APP\" \
                --resource-group \"$RG\" \
                --revision \"$REVISION\" \
                --command \"$command\"" /tmp/typescript || echo "⚠️  Command failed but continuing: $command"
            fi
            
            cat /tmp/typescript
            rm -f /tmp/typescript
          fi
        done <<< "$COMMANDS"

        echo "✅ Finished running ${{ inputs.description }}"
