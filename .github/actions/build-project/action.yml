name: 'Build Project'
description: 'Builds the project using framework-specific commands and configurations'

inputs:
  config_file:
    description: 'Path to CI configuration file'
    required: false
    default: '.github/pipeline-config.yml'

runs:
  using: 'composite'
  steps:
    - name: '🔍 Detect project type'
      id: project-type
      uses: meteor-digital/github-actions/.github/actions/detect-project-type@main

    - name: '📋 Read build configuration'
      id: config
      uses: meteor-digital/github-actions/.github/actions/parse-pipeline-config@main
      with:
        config_file: ${{ inputs.config_file }}
        
    - name: '🛍️ Install Shopware CLI'
      if: steps.project-type.outputs.type == 'shopware'
      uses: shopware/shopware-cli-action@v2
    
    - name: '🛍️ Prepare Shopware environment'
      if: steps.project-type.outputs.type == 'shopware'
      shell: bash
      run: |
        #!/bin/bash
        set -euo pipefail
        
        echo "🔧 Preparing Shopware environment for build..."
        
        # Create minimal .env file if it doesn't exist (required for asset building)
        if [ ! -f .env ]; then
          if [ -f .env.dist ]; then
            echo "📝 Creating .env from .env.dist template"
            cp .env.dist .env
          fi
          echo "✅ Environment file created"
        fi
        
    - name: '🛍️ Build Shopware project'
      if: steps.project-type.outputs.type == 'shopware'
      uses: shopware/build-project-action@v1
      env:
        SHOPWARE_CLI_EXPERIMENTAL_ASSET_CACHING: 0
        
    - name: '🅰️ Build Laravel project'
      if: steps.project-type.outputs.type == 'laravel'
      shell: bash
      run: |
        #!/bin/bash
        # Description: Build Laravel project with frontend assets and optimization
        set -euo pipefail
        
        echo "🅰️ Building Laravel project..."
        
        # Build frontend assets if package.json exists
        if [ -f "package.json" ]; then
          echo "📦 Building frontend assets..."
          if ! npm run build; then
            echo "❌ Error: Frontend asset build failed"
            exit 1
          fi
          echo "✅ Frontend assets built successfully"
        else
          echo "💡 No package.json found, skipping frontend build"
        fi
        
        # Optimize Laravel application
        echo "⚡ Optimizing Laravel application..."
        if ! php artisan optimize; then
          echo "❌ Error: Laravel optimization failed"
          exit 1
        fi
        
        echo "✅ Laravel build completed successfully"
        
    - name: '🎼 Build Symfony project'
      if: steps.project-type.outputs.type == 'symfony'
      shell: bash
      run: |
        #!/bin/bash
        # Description: Build Symfony project with frontend assets and cache warmup
        set -euo pipefail
        
        echo "🎼 Building Symfony project..."
        
        # Build frontend assets if package.json exists
        if [ -f "package.json" ]; then
          echo "📦 Building frontend assets..."
          if ! npm run build; then
            echo "❌ Error: Frontend asset build failed"
            exit 1
          fi
          echo "✅ Frontend assets built successfully"
        else
          echo "💡 No package.json found, skipping frontend build"
        fi
        
        # Warm up Symfony cache for production
        echo "🔥 Warming up Symfony cache..."
        if ! bin/console cache:warmup --env=prod; then
          echo "❌ Error: Symfony cache warmup failed"
          exit 1
        fi
        
        echo "✅ Symfony build completed successfully"
        
    - name: '🔧 Run custom build commands'
      if: steps.config.outputs.build_commands != ''
      shell: bash
      run: |
        #!/bin/bash
        # Description: Execute custom build commands from configuration
        set -euo pipefail
        
        echo "🔧 Running custom build commands from configuration..."
        
        # Execute each build command with error handling
        command_count=0
        while IFS= read -r command; do
          if [ -n "$command" ]; then
            command_count=$((command_count + 1))
            echo "🚀 Executing command $command_count: $command"
            
            if ! eval "$command"; then
              echo "❌ Error: Custom build command failed: $command"
              exit 1
            fi
            
            echo "✅ Command $command_count completed successfully"
          fi
        done <<< "${{ steps.config.outputs.build_commands }}"
        
        if [ $command_count -eq 0 ]; then
          echo "💡 No custom build commands found"
        else
          echo "✅ All $command_count custom build commands completed successfully"
        fi
        
    - name: '🗑️ Remove excluded files'
      shell: bash
      run: |
        #!/bin/bash
        # Description: Remove files and directories based on exclusion patterns
        set -euo pipefail
        
        echo "🗑️ Removing excluded files and directories..."
        
        # Process exclude patterns with improved safety
        pattern_count=0
        while IFS= read -r pattern; do
          if [ -n "$pattern" ] && [ "$pattern" != "null" ]; then
            pattern_count=$((pattern_count + 1))
            echo "🔍 Processing exclusion pattern $pattern_count: $pattern"
            
            # Sanitize pattern to prevent dangerous operations
            if [[ "$pattern" =~ ^[./]*$ ]] || [[ "$pattern" == "/" ]]; then
              echo "⚠️  Skipping dangerous pattern: $pattern"
              continue
            fi
            
            # Use find with safer removal patterns
            if [[ "$pattern" == *"/*" ]]; then
              # Directory pattern - remove directories matching pattern
              find . -path "./$pattern" -type d -print0 2>/dev/null | while IFS= read -r -d '' dir; do
                echo "  🗂️ Removing directory: $dir"
                rm -rf "$dir" 2>/dev/null || echo "  ⚠️  Could not remove: $dir"
              done
            else
              # File pattern - remove files matching pattern
              find . -name "$pattern" -type f -print0 2>/dev/null | while IFS= read -r -d '' file; do
                echo "  📄 Removing file: $file"
                rm -f "$file" 2>/dev/null || echo "  ⚠️  Could not remove: $file"
              done
            fi
          fi
        done <<< "${{ steps.config.outputs.exclude_patterns }}"
        
        if [ $pattern_count -eq 0 ]; then
          echo "💡 No exclusion patterns found"
        else
          echo "✅ Processed $pattern_count exclusion patterns"
        fi
        
    - name: '📊 Create build metadata'
      shell: bash
      run: |
        #!/bin/bash
        # Description: Create comprehensive build metadata file
        set -euo pipefail
        
        echo "📊 Creating build metadata..."
        
        # Get current timestamp in ISO format
        BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        
        # Determine reference type and name
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          REF_NAME="${{ github.ref_name }}"
          REF_TYPE="tag"
        else
          REF_NAME="${{ github.ref_name }}"
          REF_TYPE="branch"
        fi
        
        # Create build-info.json with comprehensive metadata
        cat > build-info.json << EOF
        {
          "project_name": "${{ steps.config.outputs.project_name }}",
          "project_type": "${{ steps.project-type.outputs.type }}",
          "commit_sha": "${{ github.sha }}",
          "commit_ref": "${{ github.ref }}",
          "ref_name": "$REF_NAME",
          "ref_type": "$REF_TYPE",
          "build_timestamp": "$BUILD_TIMESTAMP",
          "workflow_run_id": "${{ github.run_id }}",
          "workflow_run_number": "${{ github.run_number }}",
          "actor": "${{ github.actor }}",
          "repository": "${{ github.repository }}",
          "event_name": "${{ github.event_name }}"
        }
        EOF
        
        # Validate JSON syntax
        if ! python3 -m json.tool build-info.json >/dev/null 2>&1; then
          echo "❌ Error: Generated build metadata has invalid JSON syntax"
          exit 1
        fi
        
        echo "✅ Build metadata created successfully:"
        echo "  📄 File: build-info.json"
        echo "  🏗️  Project: ${{ steps.config.outputs.project_name }} (${{ steps.project-type.outputs.type }})"
        echo "  📝 Commit: ${{ github.sha }}"
        echo "  🏷️  Reference: $REF_NAME ($REF_TYPE)"
        echo "  ⏰ Timestamp: $BUILD_TIMESTAMP"